steps:
# Build the image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'southamerica-west1-docker.pkg.dev/seminario-gestion-incidentes/incidentes/v1.0.0', '.']
# Push the image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'southamerica-west1-docker.pkg.dev/seminario-gestion-incidentes/incidentes/v1.0.0']
# Deploy image to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args: ['run', 'deploy', 'incidentes-ci', '--image', 'southamerica-west1-docker.pkg.dev/seminario-gestion-incidentes/incidentes/v1.0.0', '--region', 'southamerica-west1']
images:
- 'southamerica-west1-docker.pkg.dev/seminario-gestion-incidentes/incidentes/v1.0.0'