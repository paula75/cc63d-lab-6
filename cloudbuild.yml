steps:
# Build the image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'southamerica-west1-docker.pkg.dev/seminario-gestion-incidentes/incidentes/$COMMIT_SHA', '.']
# Run tests outside the docker image
- name: 'python:3.11-slim'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
    pip install -r requirements.txt -r requirements-dev.txt
    pytest
# Push the image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'southamerica-west1-docker.pkg.dev/seminario-gestion-incidentes/incidentes/$COMMIT_SHA']
# Deploy image to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args: ['run', 'deploy', 'incidentes-ci', '--image', 'southamerica-west1-docker.pkg.dev/seminario-gestion-incidentes/incidentes/$COMMIT_SHA', '--region', 'southamerica-west1', '--allow-unauthenticated']
images:
- 'southamerica-west1-docker.pkg.dev/seminario-gestion-incidentes/incidentes/$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
